.grouping{
border: 2px solid var(--manborder);
border-radius:26px;
padding:var(--manpagepadding);
margin-left:1vw;
margin-right:1vw;
margin-top:1vw;
background-color:var(--manbackground2);
}
.grouping.freeze{
background-color: black;
}
/* Orientation/Arrangement of Things - START*/
.arrangeSidebySide{
display:flex;
margin-left:2vw;
/*Below is font outline color*/
-webkit-text-stroke: 0.3px var(--manborder);
}
.arrangeVertically{
margin-top:1vw;
display:flex;
flex-direction:column;
align-items:center;
max-height: 500vw;
}
/* The below class sets the property of the parent div */
.autoAligntoImmediateDiv
{
display:block;
margin:auto;
}

/* Orientation/Arrangement of Things - END*/

/* Basic Controls - START */

.butStyl
{
background:var(--manbackground);
color:var(--manbackground2);
width:100px;
text-align:center;
border-radius:40px;
position: relative;
padding: 0%;
}
.butstylcircle
{
	background-color:var(--manbackground2);
	border-radius:45px;
	height:30px;
	width: 35%;
	color: var(--manbackground);
	display: flex;
	align-items: center;
	font-size: 18px;
	font-family: 'Times New Roman', Times, serif;
	margin: 0%;
}
.butstylcircle.on{
	margin-left: 67%;
}
.butStyl:hover{
color:var(--manON);
border-color: var(--manwhite);
}

.slider{
color: var(--mandull);
background: var(--manBlue);
min-height:5vw;
margin-left:1px;
writing-mode: vertical-lr;
transform: rotate(180deg);
}
/* Basic Controls - END */

/* Logger -START */

.ChatLog{
background:var(--manbackground2);
position:relative;
width:340px;
margin-left:5vw;
} 
.History{
min-height:300px;
max-height: 350px;
max-width: 500px;
visibility:visible;
color: var(--mancolor);
overflow-y:auto;
overflow-x:auto;
font-size: large;
}
.TypeBox{
display: flex;
min-width:400px;
justify-content: center;
align-items: center;
}
.submit
{
margin-left:1vw;
margin-right:1vw;
position:relative;
}
/* Logger - End */

</style>
</head>
<body>
<h1 class="arrangeSidebySide" style="align-items: center; text-align: center; margin-left: 27vw;">
HOME APPLIANCE CONTROL SYSTEM
<div id="version" style="text-align: right;font-size: x-small; margin-left: 5vw;">Version</div>
</h1>
	<div id="bodyclass" class="arrangeSidebySide">
		<div id="BasicControl" class="grouping ">
			<h2 class="heading" style="width:400px;">Control Panel</h2>
			<div class="arrangeSidebySide" style="margin-left:4vw; gap: 5vw;">
				<div id="ButtonControls" class="arrangeVertically">
					<label for="AppControl">Power Control</label>
					<button id="AppControl" class="butStyl"><p id="AppControlCircle" class="butstylcircle">ON</p></button>
					<div id="DeviceAccess" class="arrangeVertically" style="margin-top:4vw;" >
						<label for="DeviceModeSelect">Appliance Mode</label>
						<select id="DeviceModeSelect" class="butStyl"> 
							<option>MANUAL_SAFE</option>
							<option>AUTO_NORMAL</option>
							<option>AUTO_AI</option>
							<option>MANUAL_OVERRIDE</option>
							<option >Select one</option>
						</select>
					</div>
				</div> 
				<div id="SliderValue" class="arrangeVertically">
					<label for="Timer">OFF Timer (mins)</label>
					<input id="Timer" label="OffTimer" class="slider" type="range" min="1" max="100" value="39">
					<span id="Slidevalue" style="color:var(--mancolor)">56</span>
				</div>
			</div>
			<div id="Scheduler" class="grouping" >
				<h3 class="heading">Scheduler</h3>
				<!-- <div class ="arrangeSidebySide" style="margin-left:0vw;"> -->
				<label for="startDate">Start Date and Time (DD-MM-YYYY HH:MM:SS)</label>
				<input id="startDate" class="grouping autoAligntoImmediateDiv" placeholder="When to Turn-ON?" type="datetime-local" step="1">

				<label for="duration">Duration (minutes)</label>
				<input id="duration" class="grouping autoAligntoImmediateDiv" placeholder="0 indicates Scheduling OFF">
				<!-- </div> -->
				<label for="recurring">Recurring after (hours)</label>
				<input id="recurring" class="grouping autoAligntoImmediateDiv" placeholder="0 indicates one-time scheduling" >
			</div>
		</div>
		<div id="LS" class="grouping">
			<h2 class="heading">Usage and Live Status</h2>
			<div id="Live" class="arrangeVertically grouping">
				<h3 class="heading" style="width:300px;">LiveStatus</h3>
				<span id="LiveStatus" style="color:var(--manbackground)">Get the Device Status here</span>
			</div>
			
		</div>
		<div id="ChatLog" class="grouping ">
			<h2 class="heading">ChatBox & Activities</h2>
			<p id="History" class="History"></p>
			<input id="TypeBox" class="grouping TypeBox" type="text" placeholder="Type a message to device">
			<p><button id="Submit" type="submit" class ="submit"  style="display:block;margin:auto">Submit</button></p>
		</div>
	</div>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script>
  const FRESHNESS_DETECT_MASK  = 0x80000000;
  const mc_webReadHistory      = "https://dweet.cc/get/dweets/for/";
  const mc_webReadLatest       = "https://dweet.cc/get/latest/dweet/for/";
  const mc_webWriteAll         = "https://dweet.cc/dweet/for/";
  const mc_webpage_HS          = "manuthing";
  const mc_webpage_BR          = "BrowserReadOnlyData";
  const mc_webpage_DC          = "DeviceConfig";
  const mc_webpage_DRW         = "DeviceReadWrite";
  let m_countSecs 			   = 0; //Countsecs for Browser tasks scheduling and timeout management
  let m_appliance_state 	   = 0; //Local variable to store the appliance state for UI sync and write management
  let m_date 				   = "";
  //eg.:Dweet command: PING=L&LBA=2026-06-05 08:52:10&SBD=GME_1950
  let m_WebThings_HS_KeyPair   = { PING: "", LBA: "", SBD: "" };
  let m_WebThings_DC_KeyPair   = { WFPW: "", WFID: "", WFAP: "", WAPS: "" , DEVID: "", FWV: "", BUILD_DATE: "", BR_MSG_CHATS: ""};
  // eg.: Dweet command: TIMER=2147483719&SCH_START=3920003528&SCH_DURATION=2147483737&RECUR_HRS=2147483735&MCON_REQ=2147483649&DEV_OPMODE=2147483651
  let m_WebThings_BR_KeyPair   = { STARTUP: "", ERROR_COUNT: "", CONSUMED_WATER: "", INLET_WATER: "", WL1: "", WL2: "", MS: "", LDDT: "", LEC: "", LER: "", DEV_MSG_CHATS: ""};

  let m_WebThings_DRW_KeyPair  = { TIMER: "", SCH_START: "", SCH_DURATION: "", RECUR_HRS: "", MCON_REQ: "", DEV_OPMODE: ""};
  let mc_WebThingsmap          = 
  {
	[mc_webpage_HS]			   : m_WebThings_HS_KeyPair, 
	[mc_webpage_DC]			   : m_WebThings_DC_KeyPair, 
	[mc_webpage_BR]		       : m_WebThings_BR_KeyPair, 
	[mc_webpage_DRW]		   : m_WebThings_DRW_KeyPair
  };
  let m_isChangeOngoing 	   = false; //To manage the ongoing change of the slider value and avoid multiple writes to the device until user has finalized the value by letting go of the slider
  //Event Listeners
  const mc_Version 			   = document.getElementById("version");
  const mc_ButtonControls 	   = document.getElementById("AppControl");

// Device Inteactions
async function ReadThings(webtopic = "", key = "")
{
   let retval = false;
   //logChatBox("ReadAttempt for the webtopic: " + webtopic + " key: " + key);
   if(webtopic == ""){
		//Read all things one by one
		for(let thing in mc_WebThingsmap)
		{
			retval = await Readkeys(thing, key);
			//logChatBox("thing is hello");
		}
		
   }else{
		//Read a specific thing
		//logChatBox("thing is" );
		//logChatBox("thing is hello");
		retval = await Readkeys(webtopic, key);
   }
   //logChatBox("RetvalReadThings: " + retval);
   return retval;
}
async function Readkeys(webtopic, key = "")
{
	//logChatBox(mc_webReadLatest + webtopic);
	//logChatBox(mc_webReadLatest + webtopic);
	let jsondata;
	//logChatBox(mc_webReadLatest + webtopic);
	let retval = false;
	try{
		const response = await fetch(mc_webReadLatest + webtopic);
		jsondata = await response.json();
		//logChatBox("SBD: " + jsondata.with[0].content.SBD + " webtopic: " + webtopic);
		retval = true;
	}
	catch(error){
		logChatBox("Error in fetching data from the webthing: " + mc_webReadLatest + mc_WebThingsmap[webtopic] + " .Error: " + error,"Err");
		return retval;
	}
	//Update all keys of the webtopic one by one if requested
	for(let localkey in mc_WebThingsmap[webtopic]){
		//const value = JSON.stringify(jsondata.with[0].content[key]);
		if (key == ""){
           //Allow to update the Browser variables with all keys of the requested webthing
		}else if (key != localkey){
			//Key mismatch. Skip this key
			continue;
		}
		const value = jsondata.with[0].content[localkey];
		//let formattedval = formatData(value, localkey, "skip");
		mc_WebThingsmap[webtopic][localkey] = value;
	}
	//logChatBox("RetvalReadKeys: " + retval);
	return retval;
}
/********************************END_READ*************************************/
function formatData(value, key, operation)
{
	//This function can be used to format the data based on the key and operation type (Read/Write) before storing in the local variables or sending to the device
	//For example, you can convert timestamps to human-readable format, or convert certain codes to more understandable values.
	let formattedValue = value;

	switch(key){
		//DRW thing needs formatting to detect freshness of the data for certain keys which are used for device operations and scheduling. The formatting is done by using the FRESHNESS_DETECT_MASK to set the MSB of the value when writing to the device and unsetting it when reading from the device. This way we can detect if the data read from the device is fresh (just written) or stale (already used).
		case "SCH_START":
			if(operation == "Read"){
				formattedValue = ((~FRESHNESS_DETECT_MASK) & value);
				//formattedValue -= 19800; //removing the IST offset
				//logChatBox("foMRATEED is:"+formattedValue);
				formattedValue = provideDateTime("DateTime", formattedValue*1000);//new Date(formattedValue*1000).toISOString().slice(0, 16);
				//logChatBox("DateSet is:"+value);

			}
			else if(operation == "Write"){

				//formattedValue = (value | FRESHNESS_DETECT_MASK) >>> 0; //>>>0 converts signed to unsigned
				formattedValue = (Date.parse(value)/1000);
				//formattedValue += 19800; //addign the IST offset
				formattedValue = (formattedValue | FRESHNESS_DETECT_MASK) >>> 0; //>>>0 converts signed to unsigned
				//logChatBox("DateSet is:"+value);
				//logChatBox("foMRATEED Write is:"+formattedValue);
			}
			break;
			/*
			if(operation == "Read"){
				formattedValue = ((~FRESHNESS_DETECT_MASK) & value) + 2208988800;
				formattedValue = new Date((formattedValue)*1000).toISOString();
			}
			else if(operation == "Write"){
				logChatBox("DateSet is:"+value);
				formattedValue = ((value/1000) | FRESHNESS_DETECT_MASK) >>> 0; //>>>0 converts signed to unsigned
				formattedValue -=2208988800;
				logChatBox("Formatted Date is:"+formattedValue);
			}
			break;*/
		case "TIMER":
		case "SCH_DURATION":
		case "RECUR_HRS":
		case "MCON_REQ":
		case "DEV_OPMODE":
		{
			if(Number.isNaN(Number(value)))
			{
				logChatBox("The parameter is not a number!Check:"+key +";val:"+value );
				formattedValue = 0;
			}
			else if(operation == "Read"){
				formattedValue = ((~FRESHNESS_DETECT_MASK) & value);
			}
			else if(operation == "Write"){
				formattedValue = (value | FRESHNESS_DETECT_MASK) >>> 0; //>>>0 converts signed to unsigned
			}
			break;
		}
		default:
			//No formatting for other keys as of now, but can be extended in future based on requirements
			break;
	}
	return formattedValue;
}

/*******************************START_WRITE***********************************/
 async function WriteToDevice(webtopic){
	if (await FetchDeviceWriteAccessLock(webtopic) === true){
		WriteAThing2Device(webtopic);
		logChatBox("WriteOk");
		await ReleaseDeviceWriteAccessLock();
	}
	else{
		//logChatBox("WriteNotOk or Busy");
		//Wait or reject
	}
 }
 async function WriteAThing2Device(webtopic){
	
	for(thing in mc_WebThingsmap)
	{
		if(("" === webtopic) || (webtopic === thing)){
			let payload = "";
			for(key in mc_WebThingsmap[thing]){
				payload += key +"=" +mc_WebThingsmap[thing][key] + "&";
			}
			logChatBox(mc_webWriteAll+webtopic+ "?"+payload);
			const response = await fetch(mc_webWriteAll+webtopic+ "?"+payload)
			if(response.ok){
				logChatBox("Successfully wrote to the device");
			}
			else{
				logChatBox("Failed to write to the device. Error: " + response.statusText);
				setTimeout(ReleaseDeviceWriteAccessLock(),2000);
			}
		}
	}
 }
 async function FetchDeviceWriteAccessLock(webtopic){
	//Step 1 : Check if device is Free or same MAC
	//Step 2 : If not then check if device or Browser- followd by check the last access time
	//Step 3 : If more than 2mins then force relase the lock by overwritting the user MAC
	//Step 4 : If not then wait/hold the request for the release for 15sec and then reject the request with error
	let retval = await ReadThings(mc_webpage_HS,"SBD");
	logChatBox("readval SBD:" + mc_WebThingsmap[mc_webpage_HS]["SBD"] + retval)
	let device_write = "STOP"; //IMMEDIATE, STOP, QUEUED check if free until timeout
	const current_time = new Date(provideDateTime("DateTime"));

	let UUID = fetchBrPhoneMac();

	//All okay proceed to write
	if ((retval == true) && ((mc_WebThingsmap[mc_webpage_HS]["SBD"] === "FREE") || (mc_WebThingsmap[mc_webpage_HS]["SBD"] === UUID))){
		logChatBox("Device is free or locked by same browser, proceeding to write" +mc_WebThingsmap[mc_webpage_HS]["SBD"]);
		device_write = "IMMEDIATE";
	}
	//Device has aquired lock eg.: PING=L&LBA=2026-06-05 08:52:10&SBD=GME_1950
	else if((retval == true) && (mc_WebThingsmap[mc_webpage_HS]["SBD"] == "GME_1950")){
		await ReadThings(mc_webpage_BR,"LDDT");
        
		let date1 = new Date(mc_WebThingsmap[mc_webpage_BR]["LDDT"]);
		
		//const isValidDate = date1 instanceof Date && !isNaN(last_access_time);

		//logChatBox("Device date subtracted:" + (current_time.getTime() / 1000) + " "+(date1.getTime() / 1000) + " " + isValidDate,"Err");
		logChatBox("Inactive Device locked for Secs:" + (((current_time) -  date1)/1000 ),"Err");

		if((((current_time) -  date1)/1000 > 120) || (((current_time) -  date1) < 0))	 //if last device accessed is 120 secs or more
		{
			logChatBox("ForceAquireDeviceLock");
			device_write = "IMMEDIATE";
		}
		else{
			device_write = "QUEUED";
		}
	}
	//Some other browser request ongoing
	else if((retval == true) && (mc_WebThingsmap[mc_webpage_HS]["SBD"] != "FREE")){
		const last_access_time = new Date(mc_WebThingsmap[mc_webpage_HS]["LBA"]);
		const time_diff = (current_time - last_access_time)/1000; //in seconds
		logChatBox("Usage time diff:" + time_diff ,"Err");

		logChatBox("User holidng lock" + mc_WebThingsmap[mc_webpage_HS]["SBD"]);
		if(((time_diff > 120) || (time_diff < 0))) {//if last access time is more than 120 secs or invalid{
		    logChatBox("ForceAquireOtherUserLock");	
			device_write = "IMMEDIATE";
		}
		else{
			device_write = "QUEUED";
		}
	}
	else
	{
        logChatBox("Retval: " + retval + " SBD: " + mc_WebThingsmap[mc_webpage_HS]["SBD"],"Err");
		device_write = "STOP";
	}
	
	switch(device_write){
		case "IMMEDIATE":
			mc_WebThingsmap[mc_webpage_HS]["SBD"] = UUID;
			mc_WebThingsmap[mc_webpage_HS]["LBA"] = provideDateTime("DateTime");
			retval = true;
			WriteAThing2Device(mc_webpage_HS);
			document.body.removeAttribute('inert');
			mc_bodyClass.classList.remove("freeze");
			break;
		case "QUEUED":
			//Wait for 15 secs and check again
			setTimeout(() => {
			    document.body.setAttribute('inert','');
				mc_bodyClass.classList.add("freeze");
				return WriteToDevice(webtopic);
			}, 15000);
			logChatBox("Device is busy due to another ongoing request. Your request is queued do not close this window.");
			retval = false;
			break;
		case "STOP":
			logChatBox("Error due to missing keys in the HS thing,therefore Forcing Writting ","Err");
			retval = true;
			WriteAThing2Device(mc_webpage_HS);
			break;
		default:
			logChatBox("Error While writting unhandled case" + device_write,"Err");
			retval = false;
	}
	return retval;
 }
 async function ReleaseDeviceWriteAccessLock(){
	if(await ReadThings(mc_webpage_HS,"SBD") == true)
	{
		let UUID = fetchBrPhoneMac();
		if(mc_WebThingsmap[mc_webpage_HS]["SBD"] === UUID){
			logChatBox("Device lock -already aquired");
		}else{
			logChatBox("Device lock is takenbyForce by Device","Err");
		}
	}
	logChatBox("Releasing the device lock if any by overwriting the SBD with FREE and LBA with current time");
	mc_WebThingsmap[mc_webpage_HS]["SBD"] = "FREE";
	mc_WebThingsmap[mc_webpage_HS]["LBA"] = provideDateTime("DateTime");
	await WriteAThing2Device(mc_webpage_HS);
 }
 function fetchBrPhoneMac()
 {
	let pseudoMac = "";
	//Fetch the browser MAC address using WebRTC or any other method and return it
	//Note: Fetching MAC address from browser is not straightforward and may not be possible due
	//to security restrictions. As an alternative, you can generate a unique identifier for the browser session and use it as a pseudo-MAC address.
	try{
		pseudoMac = localStorage.getItem("ACS_IOT_UUID");
		if(pseudoMac){
			logChatBox("Stored old UUID: " + pseudoMac);
		}else{
			pseudoMac = 'User_' + Math.random().toString(36).substr(2, 9);
			localStorage.setItem("ACS_IOT_UUID", pseudoMac);
			logChatBox("No existing UUID found. Generating a new one: " + pseudoMac);
		}
	}catch(error){
		logChatBox("Error in generating/fetching pseudo-MAC address: " + error,"Err");
		return "Browser-Unknown";
	}
	return pseudoMac;
 }

	setTimeout(Scheduler, 1000);
	if((m_countSecs % 5) === 0)

		//5secs tasks
		if(m_isChangeOngoing === true){

			console.log("User let go! Final value is:", mc_Timer.value);

	}

async function DeviceOperate(id)
{
	//logChatBox("DeviceOperateRequest" +id);
	switch(String(id))
	{
		case "AppControl":
		{
			if (m_appliance_state == 0){
				m_appliance_state = 1;}
			else{
				m_appliance_state = 0;
			}
			mc_WebThingsmap[mc_webpage_DRW]["MCON_REQ"] = formatData(m_appliance_state, "MCON_REQ", "Write");
			logChatBox("Device Control Request: " + m_appliance_state);
			await WriteToDevice(mc_webpage_DRW);
		}
		case "AppControl_UI":
		{
			UI_Init();
  		}break;
		case "DeviceModeSelect":
			mc_WebThingsmap[mc_webpage_DRW]["DEV_OPMODE"] = formatData(mc_DeviceModeSelect.selectedIndex, "DEV_OPMODE", "Write");
			logChatBox("Mode: "+mc_DeviceModeSelect.selectedIndex+" Request");
			await WriteToDevice(mc_webpage_DRW);
		break;
		case "Offtimeslider":
			mc_WebThingsmap[mc_webpage_DRW]["TIMER"] = formatData(mc_Timer.value, "TIMER", "Write");
			mc_Timertext.innerHTML=mc_Timer.value;
			m_isChangeOngoing = true; //Set the change ongoing flag to true when user is changing the slider value to avoid multiple writes to the device until user has finalized the value by letting go of the slider
		break;
		case "startDate":
			//let a = String(mc_StartDate.value).replace("T", " ");
			logChatBox("Selected DateTime is "+mc_StartDate.value);
			mc_WebThingsmap[mc_webpage_DRW]["SCH_START"] = formatData(mc_StartDate.value, "SCH_START", "Write");
			mc_StartDate.innerHTML= provideDateTime(mc_StartDate.value);//new Date(mc_StartDate.value).toLocaleDateString();
			await WriteToDevice(mc_webpage_DRW);
		break;
		case "duration":
			mc_WebThingsmap[mc_webpage_DRW]["SCH_DURATION"] = formatData(mc_Duration.value, "SCH_DURATION", "Write");
			mc_Duration.innerHTML=mc_Duration.value;
			await WriteToDevice(mc_webpage_DRW);
		break;
		case "recurring":
			mc_WebThingsmap[mc_webpage_DRW]["RECUR_HRS"] = formatData(mc_Recurring.value, "RECUR_HRS", "Write");
			mc_Recurring.innerHTML=mc_Recurring.value;
			await WriteToDevice(mc_webpage_DRW);
		break;
		case "LiveStatus":
			mc_LiveStatus.style.backgroundColor = "var(--manbackground)";
			await ReadThings();
			await LiveStatusUpdate();
			setTimeout(() => {
			mc_LiveStatus.style.backgroundColor = "var(--manbackground2)";
			}, 250);
		break;
		case "Submit":
			mc_WebThingsmap[mc_webpage_DRW]["BR_MSG_CHATS"] += mc_Typebox.value; //TBI History and Device Store and retireve messages
			logChatBox(mc_Typebox.value,"|REQ:");
			mc_WebThingsmap[mc_webpage_DC]["BR_MSG_CHATS"] = formatData("|REQ:"+mc_Typebox.value, "BR_MSG_CHATS", "Write"); //Dummy write to trigger the device to read the new message from the BrowserReadWrite thing. Can be replaced by a dedicated key for chats in future.
			await WriteToDevice(mc_webpage_DC);
			mc_Typebox.value = "";
			//senddata("temp","09");
			//fetchdata();
		break;
		default:
		break;
	}
}
